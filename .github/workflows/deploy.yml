# Deploy SAF-T Connector to GitHub Pages
#
# Currently deploys to: https://lucasukraine.github.io/saf-t-website/
# noindex is active on this URL (enforced in src/layouts/BaseLayout.astro).
#
# When switching to the production domain https://saf-t.com.ua:
#   1. Update astro.config.mjs — set site: 'https://saf-t.com.ua', base: '/'
#   2. noindex is removed automatically (BaseLayout checks for .github.io hostname)
#   3. Point the custom domain to GitHub Pages (or move to a different host)
#   4. Update robots.txt Sitemap line if not already pointing to saf-t.com.ua

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build with Astro
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
